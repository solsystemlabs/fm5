version: '3.8'

services:
  postgres:
    image: postgres:18
    container_name: fm5-postgres
    restart: always
    environment:
      POSTGRES_DB: fm5_dev
      POSTGRES_USER: fm5_user
      POSTGRES_PASSWORD: fm5_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fm5_user -d fm5_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local