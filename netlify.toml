[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Secrets scanning configuration
[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,.github/workflows/*,scripts/*,package.json"
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV"
  SECRETS_SCAN_ENABLED = "true"

# Production context (master branch)
[context.production]
  command = "npm ci && npm run build"

[context.production.environment]
  NODE_ENV = "production"

# Staging context (staging branch)
[context.staging]
  command = "npm ci && npm run build"

[context.staging.environment]
  NODE_ENV = "staging"

# Deploy Preview context (for pull requests)
[context.deploy-preview]
  command = "npm ci && npm run build"

[context.deploy-preview.environment]
  NODE_ENV = "staging"

# Branch deploy context (for other branches)
[context.branch-deploy]
  command = "npm ci && npm run build"

[context.branch-deploy.environment]
  NODE_ENV = "development"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

