# Cloudflare Pages configuration for FM5 Manager
name = "fm5"
compatibility_date = "2025-08-15"
compatibility_flags = ["nodejs_compat"]

# Pages-specific configuration
pages_build_output_dir = "./dist"

# Environment-specific configuration for Pages
# Note: Cloudflare Pages only supports "preview" and "production" environments
[env.preview]
vars = { NODE_ENV = "staging", PROJECT_NAME = "fm5" }

[env.production]
vars = { NODE_ENV = "production", PROJECT_NAME = "fm5" }

# Note: Headers are configured in Cloudflare Pages dashboard, not in wrangler.toml
# Go to Pages project → Settings → Headers & Redirects to configure security headers

