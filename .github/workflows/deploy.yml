name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main      # Production deployments
      - staging   # Staging deployments
  pull_request:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Only run database operations for main branch pushes (not PRs)
      - name: Run database migrations
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
        env:
          # Use different database URLs based on branch
          DATABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_DATABASE_URL || secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_DIRECT_URL || secrets.STAGING_DIRECT_URL }}
        run: |
          # Set up environment for migrations
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Running production migrations"
            npm run env:production
          else
            echo "Running staging migrations" 
            npm run env:staging
          fi
          
          # Generate Prisma client and run migrations
          npx prisma generate
          npx prisma migrate deploy

      - name: Build application
        env:
          NODE_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: npm run build

      # Cloudflare Pages will handle the actual deployment
      # This workflow primarily handles database migrations
      - name: Deploy status
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "✅ Production build complete - Cloudflare Pages will deploy automatically"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "✅ Staging build complete - Cloudflare Pages will deploy automatically"
          else
            echo "✅ PR build complete - ready for review"
          fi